services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vera-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      FRONTEND_BASE_URL: http://localhost:3000
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
      USE_SHOPIFY_MOCK: ${USE_SHOPIFY_MOCK:-true}
      USE_META_MOCK: ${USE_META_MOCK:-true}
      USE_REPLICATE_MOCK: ${USE_REPLICATE_MOCK:-true}
      USE_OPENROUTER_MOCK: ${USE_OPENROUTER_MOCK:-true}
      USE_WHATSAPP_MOCK: ${USE_WHATSAPP_MOCK:-true}
      ENV: development
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "test -n \"$$DATABASE_URL\" || (echo 'DATABASE_URL debe estar definido en backend/.env apuntando a Supabase' >&2; exit 1);
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: vera-frontend
    restart: unless-stopped
    env_file:
      - path: ./front/.env.local
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./front:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    command: pnpm dev --hostname 0.0.0.0 --port 3000

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vera-seed
    profiles:
      - seed
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      USE_SHOPIFY_MOCK: ${USE_SHOPIFY_MOCK:-true}
      USE_META_MOCK: ${USE_META_MOCK:-true}
      USE_REPLICATE_MOCK: ${USE_REPLICATE_MOCK:-true}
      USE_OPENROUTER_MOCK: ${USE_OPENROUTER_MOCK:-true}
      USE_WHATSAPP_MOCK: ${USE_WHATSAPP_MOCK:-true}
      ENV: development
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "test -n \"$$DATABASE_URL\" || (echo 'DATABASE_URL debe estar definido en backend/.env apuntando a Supabase' >&2; exit 1);
             python -m app.db.seed"
    restart: "no"

volumes:
  frontend_node_modules:
  frontend_next:
