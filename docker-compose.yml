x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL:-}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
  OPENROUTER_IMAGE_MODEL: ${OPENROUTER_IMAGE_MODEL:-black-forest-labs/flux.2-klein-4b}
  SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-vera-creatives}
  WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
  WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
  SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:-}
  SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:-}
  SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN:-}
  SHOPIFY_ADMIN_TOKEN: ${SHOPIFY_ADMIN_TOKEN:-}
  META_APP_ID: ${META_APP_ID:-}
  META_APP_SECRET: ${META_APP_SECRET:-}
  META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
  META_AD_ACCOUNT_ID: ${META_AD_ACCOUNT_ID:-}
  EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
  EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
  EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-Vera}
  EVOLUTION_FROM_NUMBER: ${EVOLUTION_FROM_NUMBER:-}
  FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:-http://localhost:3000}"
  CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000","https://verenice.online"]}'
  CREATIVE_COUNT: ${CREATIVE_COUNT:-5}
  CREATIVE_ASPECT_RATIO: "${CREATIVE_ASPECT_RATIO:-1:1}"
  AGENT_MODEL: ${AGENT_MODEL:-claude-sonnet-4-6}
  AGENT_MIN_SALES_FOR_PROPOSAL: ${AGENT_MIN_SALES_FOR_PROPOSAL:-3}
  AGENT_MIN_RATIO_VS_AVERAGE: ${AGENT_MIN_RATIO_VS_AVERAGE:-2.0}
  AGENT_COOLDOWN_DAYS: ${AGENT_COOLDOWN_DAYS:-3}
  AGENT_DEFAULT_BUDGET_ARS: ${AGENT_DEFAULT_BUDGET_ARS:-10000}
  USE_SHOPIFY_MOCK: ${USE_SHOPIFY_MOCK:-true}
  USE_META_MOCK: ${USE_META_MOCK:-true}
  USE_REPLICATE_MOCK: ${USE_REPLICATE_MOCK:-true}
  USE_OPENROUTER_MOCK: ${USE_OPENROUTER_MOCK:-true}
  USE_WHATSAPP_MOCK: ${USE_WHATSAPP_MOCK:-true}
  ENV: ${ENV:-development}

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vera-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      <<: *backend-env
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "test -n \"$$DATABASE_URL\" || (echo 'DATABASE_URL debe estar definido en backend/.env apuntando a Supabase' >&2; exit 1);
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: vera-frontend
    restart: unless-stopped
    env_file:
      - path: ./front/.env.local
        required: false
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"
    volumes:
      - ./front:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    command: pnpm dev --hostname 0.0.0.0 --port 3000

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vera-seed
    profiles:
      - seed
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "test -n \"$$DATABASE_URL\" || (echo 'DATABASE_URL debe estar definido en backend/.env apuntando a Supabase' >&2; exit 1);
             python -m app.db.seed"
    restart: "no"

volumes:
  frontend_node_modules:
  frontend_next:
